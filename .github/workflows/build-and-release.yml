name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: ReMakePlacePlugin/packages.lock.json

      - name: Download Dalamud dev build
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri 'https://github.com/Dalamud-DailyRoutines/Dalamud/releases/latest/download/latest.7z' -OutFile latest.7z
          $sevenZip = "$env:ProgramFiles\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z'
          }
          $paths = @(
            "$env:AppData\XIVLauncher\addon\Hooks\dev",
            "$env:AppData\XIVLauncherCN\addon\Hooks\dev"
          )
          foreach ($path in $paths) {
            New-Item -ItemType Directory -Force -Path $path | Out-Null
            & $sevenZip x latest.7z "-o$path" -y
            Write-Host "Dalamud extracted to: $path"
          }
          Remove-Item latest.7z -Force

      - name: Build release package
        shell: pwsh
        run: dotnet build "ReMakePlacePlugin.sln" -c Release

      - name: Prepare release files
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'release-artifacts'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Copy-Item 'bin\ReMakePlacePlugin\latest.zip' (Join-Path $artifactDir 'ReMakePlacePlugin.zip') -Force
          Copy-Item 'bin\ReMakePlacePlugin.json' (Join-Path $artifactDir 'ReMakePlacePlugin.json') -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReMakePlacePlugin-release
          path: release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/ReMakePlacePlugin.zip
            release-artifacts/ReMakePlacePlugin.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
